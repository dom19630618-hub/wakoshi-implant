<!-- 症例紹介セクション (マリーナDC デザイン参考) -->
<section id="case" class="implant-case">
    <div class="implant-case__inner">

        <header class="c-head01 is-center">
            <p class="c-head01__sub">CASE</p>
            <h2 class="c-head01__main">症例紹介</h2>
        </header>

        <div class="implant-case__list">

            <!-- CASE 01 -->
            <details class="implant-case__item" open>
                <summary class="implant-case__head">
                    <span class="implant-case__label">CASE <span class="implant-case__num">01</span></span>
                    <span class="implant-case__title-text">74歳女性の症例について</span>
                    <span class="implant-case__marker" aria-hidden="true"></span>
                </summary>

                <div class="implant-case__body">
                    <p class="implant-case__age">初診時 <strong>74歳</strong></p>

                    <!-- 写真エリア（プレースホルダー：後で差し替え可） -->
                    <div class="implant-case__photos">
                        <div class="implant-case__photo-wrap">
                            <div class="implant-case__photo-placeholder">
                                <span class="material-icons-outlined" style="font-size:40px;color:#ccc;">photo_camera</span>
                                <p>治療前写真</p>
                            </div>
                            <p class="implant-case__photo-tag">治療前</p>
                        </div>
                        <div class="implant-case__photo-wrap">
                            <div class="implant-case__photo-placeholder">
                                <span class="material-icons-outlined" style="font-size:40px;color:#ccc;">photo_camera</span>
                                <p>治療後写真</p>
                            </div>
                            <p class="implant-case__photo-tag">治療後</p>
                        </div>
                    </div>

                    <!-- 詳細テーブル -->
                    <div class="implant-case__table-wrap">
                        <table class="implant-case__table">
                            <tbody>
                                <tr>
                                    <th>主訴</th>
                                    <td>主な症状は、歯がグラグラして痛むことなど</td>
                                </tr>
                                <tr>
                                    <th>施術概要</th>
                                    <td>レントゲン、CT、精密検査の結果、歯根破折が疑われるため、即時でインプラント埋入する計画が立てられました。</td>
                                </tr>
                                <tr>
                                    <th>治療期間</th>
                                    <td>約4ヶ月半</td>
                                </tr>
                                <tr>
                                    <th>リスク・副作用</th>
                                    <td>歯根破折に伴う感染をしっかり除去できれば大きなリスクはないと判断</td>
                                </tr>
                                <tr>
                                    <th>治療結果</th>
                                    <td>治療後3か月で2次オペを行い治療が終了しました。</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </details>

        </div><!-- /.implant-case__list -->

    </div><!-- /.implant-case__inner -->
</section>
